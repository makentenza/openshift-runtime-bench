# manifests/servers/iperf3-server.yaml
#
# Network benchmark server Deployment. Runs /bench/run-network.sh with
# MODE=server: an iperf3 server on 5201/tcp and a qperf listener on 19765/tcp
# in the same container. No Service object — clients target the pod IP
# directly (resolve it into SERVER_HOST for the network client Job).
# Guaranteed QoS so the server is never the throttled side. Strategy Recreate:
# the pod is pinned to one node with reserved resources, so a rolling update
# would deadlock.
# envsubst template. Expects: NAMESPACE, BENCH_IMAGE, SERVER_RUNTIME,
# SERVER_RUNTIME_CLASS_SPEC (empty when SERVER_RUNTIME=crun),
# SERVER_NODE_NAME, BENCH_CPU, BENCH_MEMORY, ITERATIONS, DURATION.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iperf3-server-${SERVER_RUNTIME}
  namespace: ${NAMESPACE}
  labels:
    app: runtime-bench
    bench: network
    runtime: ${SERVER_RUNTIME}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: runtime-bench
      bench: network
      runtime: ${SERVER_RUNTIME}
  template:
    metadata:
      labels:
        app: runtime-bench
        bench: network
        runtime: ${SERVER_RUNTIME}
    spec:
      ${SERVER_RUNTIME_CLASS_SPEC}
      nodeSelector:
        kubernetes.io/hostname: ${SERVER_NODE_NAME}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bench
          image: ${BENCH_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/bench/run-network.sh"]
          env:
            - name: MODE
              value: "server"
            - name: RUNTIME
              value: "${SERVER_RUNTIME}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ITERATIONS
              value: "${ITERATIONS}"
            - name: DURATION
              value: "${DURATION}"
            - name: THREADS
              value: "${BENCH_CPU}"
          ports:
            - name: iperf3
              containerPort: 5201
              protocol: TCP
            - name: qperf
              containerPort: 19765
              protocol: TCP
          resources:
            requests:
              cpu: "${BENCH_CPU}"
              memory: "${BENCH_MEMORY}"
            limits:
              cpu: "${BENCH_CPU}"
              memory: "${BENCH_MEMORY}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

# manifests/startup/startup-pod.yaml
#
# Minimal pod for externally measured startup time (scripts/measure-startup.sh
# times create -> Ready from the workstation) and for per-pod memory
# overhead/density measurement (scripts/measure-overhead.sh). The container
# just sleeps; fixed small resources (500m/512Mi, Guaranteed QoS) and
# terminationGracePeriodSeconds 0 keep create/delete cycles fast and
# comparable across runtimes. Pre-pull the image first
# (manifests/prepull-daemonset.yaml) so pull time is excluded.
# envsubst template. Expects: NAMESPACE, BENCH_IMAGE, POD_NAME, RUNTIME,
# RUNTIME_CLASS_SPEC (empty when RUNTIME=crun), NODE_NAME.
apiVersion: v1
kind: Pod
metadata:
  name: ${POD_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: runtime-bench
    bench: startup
    runtime: ${RUNTIME}
spec:
  ${RUNTIME_CLASS_SPEC}
  restartPolicy: Never
  terminationGracePeriodSeconds: 0
  nodeSelector:
    kubernetes.io/hostname: ${NODE_NAME}
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: bench
      image: ${BENCH_IMAGE}
      imagePullPolicy: IfNotPresent
      command: ["sleep", "infinity"]
      resources:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 512Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

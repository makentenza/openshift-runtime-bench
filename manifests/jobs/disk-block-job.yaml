# manifests/jobs/disk-block-job.yaml
#
# Disk benchmark against a raw block PVC (no filesystem in the measured path).
# Multi-doc: PVC (volumeMode Block) + Job attaching it via volumeDevices at
# /dev/bench-block and running /bench/run-disk.sh with TARGET_MODE=block.
# envsubst template. Expects: NAMESPACE, BENCH_IMAGE, RUNTIME,
# RUNTIME_CLASS_SPEC (empty when RUNTIME=crun), PODVM_ANNOTATION (empty unless a kata-remote pod-VM instance type is pinned), NODE_NAME, BENCH_CPU,
# BENCH_MEMORY, ITERATIONS, DURATION, STORAGE_CLASS_SPEC (empty for the
# cluster default StorageClass), PVC_SIZE.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bench-pvc-block-${RUNTIME}
  namespace: ${NAMESPACE}
  labels:
    app: runtime-bench
    bench: disk
    runtime: ${RUNTIME}
spec:
  ${STORAGE_CLASS_SPEC}
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  resources:
    requests:
      storage: ${PVC_SIZE}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: bench-disk-block-${RUNTIME}
  namespace: ${NAMESPACE}
  labels:
    app: runtime-bench
    bench: disk
    runtime: ${RUNTIME}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: runtime-bench
        bench: disk
        runtime: ${RUNTIME}
      annotations:
        ${PODVM_ANNOTATION}
    spec:
      ${RUNTIME_CLASS_SPEC}
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: ${NODE_NAME}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bench
          image: ${BENCH_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/bench/run-disk.sh"]
          env:
            - name: RUNTIME
              value: "${RUNTIME}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ITERATIONS
              value: "${ITERATIONS}"
            - name: DURATION
              value: "${DURATION}"
            - name: THREADS
              value: "${BENCH_CPU}"
            - name: TARGET_MODE
              value: "block"
            - name: BLOCK_DEV
              value: "/dev/bench-block"
          resources:
            requests:
              cpu: "${BENCH_CPU}"
              memory: "${BENCH_MEMORY}"
            limits:
              cpu: "${BENCH_CPU}"
              memory: "${BENCH_MEMORY}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeDevices:
            - name: data
              devicePath: /dev/bench-block
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: bench-pvc-block-${RUNTIME}

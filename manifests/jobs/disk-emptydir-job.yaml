# manifests/jobs/disk-emptydir-job.yaml
#
# Disk benchmark Job against an emptyDir volume (node local ephemeral storage;
# for kata this exercises the virtio path into the guest). Runs
# /bench/run-disk.sh with TARGET_MODE=fs against /bench-data.
# envsubst template. Expects: NAMESPACE, BENCH_IMAGE, RUNTIME,
# RUNTIME_CLASS_SPEC (empty when RUNTIME=crun), NODE_NAME, BENCH_CPU,
# BENCH_MEMORY, ITERATIONS, DURATION.
apiVersion: batch/v1
kind: Job
metadata:
  name: bench-disk-emptydir-${RUNTIME}
  namespace: ${NAMESPACE}
  labels:
    app: runtime-bench
    bench: disk
    runtime: ${RUNTIME}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: runtime-bench
        bench: disk
        runtime: ${RUNTIME}
    spec:
      ${RUNTIME_CLASS_SPEC}
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: ${NODE_NAME}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bench
          image: ${BENCH_IMAGE}
          imagePullPolicy: IfNotPresent
          command: ["/bench/run-disk.sh"]
          env:
            - name: RUNTIME
              value: "${RUNTIME}"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: ITERATIONS
              value: "${ITERATIONS}"
            - name: DURATION
              value: "${DURATION}"
            - name: THREADS
              value: "${BENCH_CPU}"
            - name: TARGET_MODE
              value: "fs"
            - name: TARGET_DIR
              value: "/bench-data"
          resources:
            requests:
              cpu: "${BENCH_CPU}"
              memory: "${BENCH_MEMORY}"
            limits:
              cpu: "${BENCH_CPU}"
              memory: "${BENCH_MEMORY}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /bench-data
      volumes:
        - name: data
          emptyDir: {}
